<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL ARSENAL 666 - PRO MASTER & COMPRESS</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding: 10px; margin: 0; box-sizing: border-box; }
        #bunker { border: 3px solid #f00; padding: 15px; box-shadow: 0 0 35px #f00; display: inline-block; background: #050505; border-radius: 12px; width: 100%; max-width: 400px; }
        h1 { color: #fff; text-shadow: 3px 3px #f00; font-size: 1.8rem; margin: 10px 0; }
        .precios { margin: 10px 0; font-size: 0.75rem; color: #0f0; border-collapse: collapse; width: 100%; }
        .precios th { color: #fff; border-bottom: 2px solid #f00; padding: 5px; }
        .precios td { border: 1px solid #222; padding: 6px; }
        .btn-pago { background: #0f0; color: #000; padding: 15px; font-weight: bold; text-decoration: none; display: block; margin: 10px auto; border-radius: 8px; border: 2px solid #fff; }
        select, input, button { background: #000; color: #f00; border: 2px solid #f00; padding: 12px; font-weight: bold; width: 100%; margin-bottom: 12px; border-radius: 5px; box-sizing: border-box; }
        button { background: #f00; color: #000; cursor: pointer; font-size: 1.2rem; box-shadow: 0 5px #800; border: none; }
        #erick-key { position: fixed; bottom: 0; right: 0; width: 50px; height: 50px; cursor: pointer; opacity: 0.2; z-index: 1000; }
        #erick-key svg { fill: #f00; width: 100%; height: 100%; }
        #descarga-zona { display: none; margin-top: 20px; border-top: 3px double #0f0; padding-top: 15px; }
        .btn-download { background: #0f0; color: #000; padding: 15px; text-decoration: none; font-weight: bold; display: block; border-radius: 5px; }
        #status { color: #fff; background: #800; display: none; padding: 5px; margin: 10px 0; font-size: 0.8rem; border-radius: 4px; }
    </style>
</head>
<body translate="no">

    <div id="bunker">
        <h1>🎸 EL ARSENAL 🤘</h1>
        <table class="precios">
            <tr><th>PLAN</th><th>MEX</th><th>USD</th></tr>
            <tr><td>1 SONG MASTER</td><td>$100</td><td>$20</td></tr>
            <tr style="color: #0ff;"><td>6 SONGS (EP)</td><td>$400</td><td>$75</td></tr>
            <tr style="color: #ff0;"><td>8 SONGS (ALBUM)</td><td>$500</td><td>$95</td></tr>
        </table>
        
        <div id="zona-pago"><a href="https://link.mercadopago.com.mx/elarsenalerick" target="_blank" class="btn-pago">💰 PAGA AQUÍ</a></div>
        
        <input type="file" id="archivo" accept="audio/*">
        
        <select id="genero">
            <option value="death">1. DEATH / BLACK METAL</option>
            <option value="thrash">2. THRASH (MEGADETH)</option>
            <option value="heavy">3. HEAVY METAL</option>
            <option value="urbano">4. ROCK URBANO / PUNK</option>
            <option value="dark">5. POST-PUNK</option>
            <option value="grunge">6. GRUNGE (ALICE IN CHAINS)</option>
            <option value="alt">7. ALTERNATIVE ROCK</option>
            <option value="ska">8. SKA / SKA-PUNK</option>
            <option value="indie">9. INDIE / MYSTIC</option>
            <option value="blues">10. BLUES / HARD ROCK</option>
        </select>

        <div id="status">PULIENDO Y COMPRIMIENDO... 🔥</div>
        <button id="btn-detonar">DETONAR MÁSTER PRO 💥</button>

        <div id="descarga-zona">
            <h3 style="color: #0f0;">MÁSTER COMPRIMIDO LISTO</h3>
            <audio id="reproductor" controls style="width:100%;"></audio>
            <a id="link-descarga" class="btn-download">📥 DESCARGAR MÁSTER (.MP3)</a>
        </div>
    </div>

    <div id="erick-key" onclick="let c=prompt('FRASE:'); if(c && c.toLowerCase().includes('666')){document.getElementById('zona-pago').style.display='none';alert('MODO MAESTRO ACTIVADO');}">
        <svg viewBox="0 0 100 100"><path d="M50 5 L63 38 L95 38 L69 59 L79 92 L50 72 L21 92 L31 59 L5 38 L37 38 Z"/></svg>
    </div>

    <script>
        document.getElementById('btn-detonar').onclick = async () => {
            const file = document.getElementById('archivo').files[0];
            if (!file) return alert("Sube el track.");
            
            const status = document.getElementById('status');
            status.style.display = 'block';
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const reader = new FileReader();
            
            reader.onload = async (e) => {
                const buffer = await audioCtx.decodeAudioData(e.target.result);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;

                // --- PROCESO DE MÁSTER ---
                const eq = audioCtx.createBiquadFilter();
                eq.type = "highshelf"; eq.frequency.value = 5000; eq.gain.value = 10;

                const comp = audioCtx.createDynamicsCompressor();
                comp.threshold.value = -24; comp.ratio.value = 12;

                const gain = audioCtx.createGain();
                gain.gain.value = 3.5;

                const dest = audioCtx.createMediaStreamDestination();
                source.connect(eq); eq.connect(comp); comp.connect(gain); gain.connect(dest);

                // --- COMPRESIÓN DE SALIDA (MP3 de 128kbps para que no pese) ---
                const recorder = new MediaRecorder(dest.stream, { audioBitsPerSecond : 128000 });
                const chunks = [];
                
                recorder.ondataavailable = ev => chunks.push(ev.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/mp3' });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('reproductor').src = url;
                    document.getElementById('link-descarga').href = url;
                    document.getElementById('link-descarga').download = "Master_Erick_Arsenal.mp3";
                    document.getElementById('descarga-zona').style.display = 'block';
                    status.style.display = 'none';
                };
                
                recorder.start();
                source.start(0);
                source.onended = () => {
                    recorder.stop();
                    audioCtx.close();
                };
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
