<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL ARSENAL: LA METAMORFOSIS DEL SONIDO</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding: 10px; margin: 0; }
        #bunker { border: 4px double #f00; padding: 20px; box-shadow: 0 0 50px #f00; display: inline-block; background: #050505; border-radius: 15px; width: 100%; max-width: 420px; }
        h1 { color: #fff; text-shadow: 2px 2px #f00; margin: 5px 0; font-size: 1.3rem; }
        h2 { color: #0f0; font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 20px; text-transform: uppercase; }
        
        #caja-cobro { background: #111; border: 2px solid #0f0; padding: 15px; margin: 15px 0; border-radius: 10px; }
        .monto { color: #0f0; font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        .btn-pagar { background: #0f0; color: #000; padding: 12px; border: none; font-weight: bold; width: 100%; cursor: pointer; border-radius: 5px; margin-top: 10px; text-decoration: none; display: block; }
        
        #vpn-alert { display: none; color: #fff; background: #f00; padding: 10px; font-weight: bold; border: 2px solid #fff; margin-bottom: 15px; }
        
        select, input, button { background: #000; color: #f00; border: 2px solid #f00; padding: 15px; font-weight: bold; width: 100%; margin-bottom: 12px; border-radius: 5px; box-sizing: border-box; }
        #btn-detonar { background: #f00; color: #000; cursor: pointer; font-size: 1.2rem; box-shadow: 0 6px #600; border: none; }
        #descarga-zona { display: none; margin-top: 20px; border-top: 5px double #0f0; padding-top: 15px; }
        .btn-download { background: #0f0; color: #000; padding: 18px; text-decoration: none; font-weight: bold; display: block; border-radius: 10px; border: 2px solid #fff; }
    </style>
</head>
<body translate="no">

    <div id="bunker">
        <h1>🎸 EL ARSENAL 🤘</h1>
        <h2>LA METAMORFOSIS DEL SONIDO</h2>
        
        <div id="vpn-alert">⚠️ ACCESO RESTRINGIDO: SOLO TERRITORIO NACIONAL (MX) ⚠️</div>

        <select id="genero" onchange="actualizarCosto()">
            <option value="thrash" data-costo="850">🔥 THRASH (MEGADETH STYLE) - $850</option>
            <option value="death" data-costo="950">💀 DEATH METAL (PRO MASTER) - $950</option>
            <option value="industrial" data-costo="1000">⚙️ INDUSTRIAL (NIN STYLE) - $1000</option>
            <option value="rock" data-costo="600">⚡ ROCK N' ROLL (ACDC STYLE) - $600</option>
        </select>

        <div id="caja-cobro">
            <div class="monto" id="monto-final">$850.00 MXN</div>
            <a href="#" class="btn-pagar" id="link-pago">💳 PAGAR (SOLO MÉXICO)</a>
        </div>

        <input type="file" id="archivo" accept="audio/*">
        <button id="btn-detonar">DETONAR MÁSTER 💥</button>
        
        <div id="descarga-zona">
            <audio id="reproductor" controls style="width:100%;"></audio>
            <a id="link-descarga" class="btn-download">📥 DESCARGAR MÁSTER FINAL</a>
        </div>
    </div>

    <script>
        // --- SEGURIDAD ANTI-VPN / ANTI-GABACHO ---
        function checkSecurity() {
            const isEnglish = navigator.language.startsWith('en');
            const isNotMXTime = !Intl.DateTimeFormat().resolvedOptions().timeZone.includes('Mexico');
            
            if (isEnglish || isNotMXTime) {
                document.getElementById('vpn-alert').style.display = 'block';
                document.getElementById('btn-detonar').disabled = true;
                document.getElementById('btn-detonar').style.opacity = '0.3';
                document.getElementById('link-pago').innerText = "BLOQUEADO: NO DISPONIBLE EN TU REGIÓN";
                return false;
            }
            return true;
        }

        window.onload = checkSecurity;

        function actualizarCosto() {
            const select = document.getElementById('genero');
            const costo = select.options[select.selectedIndex].getAttribute('data-costo');
            document.getElementById('monto-final').innerText = `$${costo}.00 MXN`;
            document.getElementById('link-pago').href = `https://www.mercadopago.com.mx/checkout/v1/redirect?pref_id=TU_PREF_${costo}`;
        }

        document.getElementById('btn-detonar').onclick = async () => {
            if (!checkSecurity()) return alert("Solo clientes en México.");
            
            const file = document.getElementById('archivo').files[0];
            if (!file) return alert("Sube el track.");
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const decodedData = await audioCtx.decodeAudioData(e.target.result);
                const offlineCtx = new OfflineAudioContext(decodedData.numberOfChannels, decodedData.length, decodedData.sampleRate);
                
                const source = offlineCtx.createBufferSource();
                source.buffer = decodedData;

                // --- CADENA PROFESIONAL (HI-HAT TIGHT + MARSHALL) ---
                const hiHatFix = offlineCtx.createBiquadFilter();
                hiHatFix.type = "highpass"; hiHatFix.frequency.value = 450; 
                const antiLata = offlineCtx.createBiquadFilter();
                antiLata.type = "notch"; antiLata.frequency.value = 3800; antiLata.Q.value = 4.0;
                
                const limiter = offlineCtx.createDynamicsCompressor();
                limiter.threshold.value = -38; limiter.ratio.value = 20;

                const gain = offlineCtx.createGain();
                gain.gain.value = 5.0;

                source.connect(hiHatFix); hiHatFix.connect(antiLata);
                antiLata.connect(limiter); limiter.connect(gain);
                gain.connect(offlineCtx.destination);
                
                source.start(0);
                const renderedBuffer = await offlineCtx.startRendering();
                const blob = bufferToWave(renderedBuffer, renderedBuffer.length);
                
                document.getElementById('reproductor').src = URL.createObjectURL(blob);
                document.getElementById('link-descarga').href = URL.createObjectURL(blob);
                document.getElementById('link-descarga').download = "Master_Arsenal_MX.wav";
                document.getElementById('descarga-zona').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        };

        function bufferToWave(abuffer, len) {
            let numOfChan = abuffer.numberOfChannels, length = len * numOfChan * 2 + 44, buffer = new ArrayBuffer(length), view = new DataView(buffer),
                channels = [], i, sample, offset = 0, pos = 0;
            const setUint16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            const setUint32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
            setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);
            for(i = 0; i < abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));
            while(pos < length) {
                for(i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                    view.setInt16(pos, sample, true); pos += 2;
                }
                offset++;
            }
            return new Blob([buffer], {type: "audio/wav"});
        }
    </script>
</body>
</html>
