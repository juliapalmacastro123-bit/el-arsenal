<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL ARSENAL 666 - ANTI-VICIO ENGINE</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding: 10px; margin: 0; }
        #bunker { border: 4px double #f00; padding: 20px; box-shadow: 0 0 50px #f00; display: inline-block; background: #050505; border-radius: 15px; width: 100%; max-width: 420px; }
        h1 { color: #fff; text-shadow: 2px 2px #f00; margin: 5px 0; }
        select, input, button { background: #000; color: #f00; border: 2px solid #f00; padding: 15px; font-weight: bold; width: 100%; margin-bottom: 12px; border-radius: 5px; box-sizing: border-box; }
        button { background: #f00; color: #000; cursor: pointer; font-size: 1.3rem; box-shadow: 0 6px #600; border: none; }
        #descarga-zona { display: none; margin-top: 20px; border-top: 5px double #0f0; padding-top: 15px; }
        .btn-download { background: #0f0; color: #000; padding: 18px; text-decoration: none; font-weight: bold; display: block; border-radius: 10px; border: 2px solid #fff; }
    </style>
</head>
<body translate="no">

    <div id="bunker">
        <h1>🎸 EL ARSENAL 🤘</h1>
        <p style="color:#0f0; font-size:0.7rem;">ELIMINADOR DE VICIO Y SISEO DIGITAL</p>
        
        <select id="genero">
            <option value="thrash">🔥 THRASH (LIMPIEZA QUIRÚRGICA)</option>
            <option value="death">💀 DEATH METAL (PODER BRUTO)</option>
            <option value="grunge">🎸 GRUNGE (ATAQUE SECO)</option>
            <option value="heavy">⛓️ HEAVY CLASSIC (PODER TRADICIONAL)</option>
        </select>

        <input type="file" id="archivo" accept="audio/*">
        <button id="btn-detonar">DETONAR MÁSTER LIMPIO 💥</button>
        
        <div id="descarga-zona">
            <h3 style="color: #0f0;">MÁSTER SIN VICIO LISTO</h3>
            <audio id="reproductor" controls style="width:100%;"></audio>
            <a id="link-descarga" class="btn-download">📥 DESCARGAR MÁSTER .WAV</a>
        </div>
    </div>

    <script>
        document.getElementById('btn-detonar').onclick = async () => {
            const file = document.getElementById('archivo').files[0];
            if (!file) return alert("Sube el track.");
            document.getElementById('status').style.display = 'block';
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const decodedData = await audioCtx.decodeAudioData(e.target.result);
                const offlineCtx = new OfflineAudioContext(decodedData.numberOfChannels, decodedData.length, decodedData.sampleRate);
                
                const source = offlineCtx.createBufferSource();
                source.buffer = decodedData;

                // --- 1. FILTRO ANTI-VICIO (Corte de siseo metálico) ---
                const hiCut = offlineCtx.createBiquadFilter();
                hiCut.type = "lowpass";
                hiCut.frequency.value = 8500; // Nada de siseo por encima de 8.5kHz

                // --- 2. NOTCH ANTI-LATAS (Corte quirúrgico en 4.5kHz) ---
                const notch = offlineCtx.createBiquadFilter();
                notch.type = "notch";
                notch.frequency.value = 4500;
                notch.Q.value = 4.0;

                // --- 3. EXCITADOR DE MEDIOS (Cuerpo de Marshall) ---
                const mids = offlineCtx.createBiquadFilter();
                mids.type = "peaking";
                mids.frequency.value = 2500;
                mids.gain.value = 10;

                // --- 4. COMPRESOR DE HI-HATS (Cerrado y Seco) ---
                const comp = offlineCtx.createDynamicsCompressor();
                comp.threshold.value = -35; 
                comp.ratio.value = 20; 
                comp.attack.value = 0.0001; // Aplasta el vicio al instante
                comp.knee.value = 0;

                const gain = offlineCtx.createGain();
                gain.gain.value = 4.8;

                source.connect(hiCut);
                hiCut.connect(notch);
                notch.connect(mids);
                mids.connect(comp);
                comp.connect(gain);
                gain.connect(offlineCtx.destination);
                
                source.start(0);
                const renderedBuffer = await offlineCtx.startRendering();
                const blob = bufferToWave(renderedBuffer, renderedBuffer.length);
                
                document.getElementById('reproductor').src = URL.createObjectURL(blob);
                document.getElementById('link-descarga').href = URL.createObjectURL(blob);
                document.getElementById('link-descarga').download = "Master_Sin_Vicio.wav";
                document.getElementById('descarga-zona').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        };

        function bufferToWave(abuffer, len) {
            let numOfChan = abuffer.numberOfChannels, length = len * numOfChan * 2 + 44, buffer = new ArrayBuffer(length), view = new DataView(buffer),
                channels = [], i, sample, offset = 0, pos = 0;
            const setUint16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            const setUint32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
            setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);
            for(i = 0; i < abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));
            while(pos < length) {
                for(i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                    view.setInt16(pos, sample, true); pos += 2;
                }
                offset++;
            }
            return new Blob([buffer], {type: "audio/wav"});
        }
    </script>
</body>
</html>
