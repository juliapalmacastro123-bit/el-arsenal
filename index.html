<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL ARSENAL 666 - COUNTDOWN MODE</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding: 10px; margin: 0; }
        #bunker { border: 3px solid #f00; padding: 15px; box-shadow: 0 0 35px #f00; display: inline-block; background: #050505; border-radius: 12px; width: 100%; max-width: 400px; }
        h1 { color: #fff; text-shadow: 2px 2px #f00; margin: 10px 0; }
        input, button { background: #000; color: #f00; border: 2px solid #f00; padding: 12px; font-weight: bold; width: 100%; margin-bottom: 12px; border-radius: 5px; box-sizing: border-box; }
        button { background: #f00; color: #000; cursor: pointer; font-size: 1.2rem; box-shadow: 0 5px #800; border: none; }
        #status { color: #fff; background: #800; display: none; padding: 10px; margin: 10px 0; font-weight: bold; }
        #descarga-zona { display: none; margin-top: 20px; border-top: 3px double #0f0; padding-top: 15px; }
        .btn-download { background: #0f0; color: #000; padding: 15px; text-decoration: none; font-weight: bold; display: block; border-radius: 5px; }
    </style>
</head>
<body translate="no">

    <div id="bunker">
        <h1>🎸 EL ARSENAL 🤘</h1>
        <p style="color:#0f0; font-size:0.8rem;">ENGINE: MEGADETH / RUST IN PEACE</p>
        <input type="file" id="archivo" accept="audio/*">
        <div id="status">APLASTANDO PLATILLOS... 🔥</div>
        <button id="btn-detonar">DETONAR MÁSTER MEGADETH 💥</button>
        <div id="descarga-zona">
            <h3 style="color: #0f0;">MÁSTER NIVEL ESTUDIO PRO</h3>
            <audio id="reproductor" controls style="width:100%;"></audio>
            <a id="link-descarga" class="btn-download">📥 DESCARGAR MÁSTER</a>
        </div>
    </div>

    <script>
        document.getElementById('btn-detonar').onclick = async () => {
            const file = document.getElementById('archivo').files[0];
            if (!file) return alert("Sube el track.");
            document.getElementById('status').style.display = 'block';
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const decodedData = await audioCtx.decodeAudioData(e.target.result);
                const offlineCtx = new OfflineAudioContext(decodedData.numberOfChannels, decodedData.length, decodedData.sampleRate);
                
                const source = offlineCtx.createBufferSource();
                source.buffer = decodedData;

                // 1. DE-ESSER AGRESIVO (Aplastamos el siseo de las "tostadas")
                // Filtro para detectar solo el ruido molesto
                const deEsser = offlineCtx.createBiquadFilter();
                deEsser.type = "peaking";
                deEsser.frequency.value = 7000;
                deEsser.Q.value = 2.0;
                deEsser.gain.value = -15; // Corte profundo en el chillido

                // 2. LIMITADOR DE AGUDOS (Corte de tajo Megadeth)
                const hiCut = offlineCtx.createBiquadFilter();
                hiCut.type = "lowpass";
                hiCut.frequency.value = 9000; // Nada de "aire" innecesario, solo poder

                // 3. GUITAR BODY (Ese sonido "parejo" que buscas)
                const body = offlineCtx.createBiquadFilter();
                body.type = "peaking";
                body.frequency.value = 1500;
                body.gain.value = 8; // Punch en el pecho

                // 4. COMPRESIÓN MULTIBANDA (Soft Clipper)
                const comp = offlineCtx.createDynamicsCompressor();
                comp.threshold.value = -30; // Compresión fuerte para igualar todo
                comp.ratio.value = 20;
                comp.attack.value = 0.001; 
                comp.knee.value = 0; // Hard knee para controlar los transitorios

                const finalGain = offlineCtx.createGain();
                finalGain.gain.value = 4.0;

                source.connect(deEsser);
                deEsser.connect(hiCut);
                hiCut.connect(body);
                body.connect(comp);
                comp.connect(finalGain);
                finalGain.connect(offlineCtx.destination);
                
                source.start(0);
                const renderedBuffer = await offlineCtx.startRendering();
                const blob = bufferToWave(renderedBuffer, renderedBuffer.length);
                
                document.getElementById('reproductor').src = URL.createObjectURL(blob);
                document.getElementById('link-descarga').href = URL.createObjectURL(blob);
                document.getElementById('link-descarga').download = "Master_Megadeth_Style.wav";
                document.getElementById('descarga-zona').style.display = 'block';
                document.getElementById('status').style.display = 'none';
            };
            reader.readAsArrayBuffer(file);
        };

        function bufferToWave(abuffer, len) {
            let numOfChan = abuffer.numberOfChannels, length = len * numOfChan * 2 + 44, buffer = new ArrayBuffer(length), view = new DataView(buffer),
                channels = [], i, sample, offset = 0, pos = 0;
            const setUint16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            const setUint32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
            setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);
            for(i = 0; i < numOfChan; i++) channels.push(abuffer.getChannelData(i));
            while(pos < length) {
                for(i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                    view.setInt16(pos, sample, true); pos += 2;
                }
                offset++;
            }
            return new Blob([buffer], {type: "audio/wav"});
        }
    </script>
</body>
</html>
